# The team's local "SaaS" — all OSS, all local. Fill the TODOs.
services:
  postgres:
    image: postgres:16
    environment: { POSTGRES_PASSWORD: dev }
    volumes: ["pg:/var/lib/postgresql/data"]
  gitea:                       # git + issues + projects(Kanban) + PRs + Actions(CI)
    image: gitea/gitea:1.22
    environment: { GITEA__database__DB_TYPE: postgres, GITEA__database__HOST: postgres:5432,
                   GITEA__actions__ENABLED: "true" }
    ports: ["3000:3000", "2222:22"]
    depends_on: [postgres]
  gitea-runner:                # executes Gitea Actions (the CI gate)
    image: gitea/act_runner:latest
    # TODO: register the runner — set GITEA_RUNNER_REGISTRATION_TOKEN from Gitea admin.
    environment: { GITEA_INSTANCE_URL: http://gitea:3000, GITEA_RUNNER_REGISTRATION_TOKEN: "${RUNNER_TOKEN}" }
    volumes: ["/var/run/docker.sock:/var/run/docker.sock"]
    depends_on: [gitea]
  wiki:                        # docs — Confluence alternative
    image: requarks/wiki:2
    environment: { DB_TYPE: postgres, DB_HOST: postgres, DB_USER: postgres, DB_PASS: dev, DB_NAME: wiki }
    ports: ["3001:3000"]
    depends_on: [postgres]
  mattermost:                  # chat + notifications — Teams/Slack alternative
    image: mattermost/mattermost-team-edition:9
    environment: { MM_SQLSETTINGS_DRIVERNAME: postgres,
                   MM_SQLSETTINGS_DATASOURCE: "postgres://postgres:dev@postgres/mattermost?sslmode=disable" }
    ports: ["8065:8065"]
    depends_on: [postgres]
  # TODO: add the `ollama` service (local LLM in Docker) — see ../after/ for the shape.
  approvals:                   # the HUMAN UI — submit features + approve the plan/stack gates (FastAPI)
    build: ./approvals
    ports: ["8080:8080"]       # http://localhost:8080
  orchestrator:                # THE ORCHESTRATOR — fully local; drives a CLI runner over Ollama
    build: ./orchestrator
    environment: { GITEA_URL: http://gitea:3000, MM_URL: http://mattermost:8065,
                   OLLAMA_BASE_URL: http://ollama:11434/v1,
                   OLLAMA_MODEL: "",            # REQUIRED — set me, e.g. qwen2.5-coder:14b (no default)
                   AGENT_RUNNER: goose,         # goose | aider | openhands
                   APPROVALS_URL: http://approvals:8080 }
    depends_on: [gitea, mattermost, approvals]  # TODO: also depend on the ollama service you add
    # invoke per feature:
    #   docker compose run --rm -e CC_BRIEF="..." -e OLLAMA_MODEL=qwen2.5-coder:14b orchestrator
volumes: { pg: {} }
